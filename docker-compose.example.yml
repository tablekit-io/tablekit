services:
  core:
    build:
      context: .
      dockerfile: Dockerfile-core

    environment:
      # The externally reachable base url; used as the OAuth issuer.
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-http://localhost:8080}"

      # Ports the server listens on. app port: MCP (/mcp) + OAuth; control port:
      # /health. Overridable from the host env; the ports mapping below tracks
      # the same values so a change takes effect end-to-end.
      APP_PORT: "${APP_PORT:-8080}"
      CONTROL_PORT: "${CONTROL_PORT:-8081}"

      # TableKit's own state lives in the postgres service below. The
      # structured DB_* vars take precedence over DATABASE_URL; change the
      # password to match the database service.
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      DB_NAME: tablekit

      # Where the databases config is read from. Resolved by base name, so either
      # /app/databases.yaml or /app/databases.yml is accepted
      DATABASES_FILE: "${DATABASES_FILE:-/app/databases.yaml}"

      # Required base64 HS256 signing key — TableKit does not generate one, so
      # `up` fails loudly if it is unset. Generate with `openssl rand -base64 32`
      # and share the same value across instances.
      SIGNING_KEY: "${SIGNING_KEY:-}"

      # It helps us immensely if you do enable this
      ENABLE_ANONYMOUS_TELEMETRY: "${ENABLE_ANONYMOUS_TELEMETRY:-}"

    ports:
      # app port: MCP (/mcp) + OAuth (/oauth/*, /register, /.well-known/*)
      - target: ${APP_PORT:-8080}
        published: ${APP_PORT:-8080}
        protocol: tcp

      # control port: /health — keep off the public internet
      - target: ${CONTROL_PORT:-8081}
        published: ${CONTROL_PORT:-8081}
        protocol: tcp

    volumes:
      # Your database connectors (see databases.example.yml for reference). Create
      # this file first (e.g. `cp databases.example.yml databases.yml`)
      - type: bind
        source: ./databases.yml
        target: /app/databases.yml

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${CONTROL_PORT:-8081}/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

    depends_on:
      postgres:
        condition: service_healthy

    restart: unless-stopped

  # TableKit's own state database (OAuth/MCP state + the query_database descriptor
  # log). core migrates it on boot; the DB_* env above points at it. Not
  # published to the host — only core (on the default compose network) reaches it.
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${DB_PASSWORD:-postgres}"
      POSTGRES_DB: tablekit

    ports:
      - published: 5432
        target: 5432
        protocol: tcp

    volumes:
      - type: volume
        source: pgdata
        target: /var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tablekit"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  # Persists TableKit's own state (the postgres database).
  pgdata:
