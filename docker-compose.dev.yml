services:
  core:
    build:
      context: ./core
      dockerfile: Dockerfile-dev
    environment:
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-http://localhost:8080}"
      # Persist Go module + build caches in the gocache named volume (mounted
      # below) so deps are downloaded and compiled once, not on every start.
      GOMODCACHE: /gocache/mod
      GOCACHE: /gocache/build
      # The stable network throw-away e2e DB containers attach to, so code in
      # this container can reach them by name (e.g. testdb:5432).
      TABLEKIT_E2E_DOCKER_NETWORK: tablekit
      # Point run_sql at the committed dev DB config (core/ is bind-mounted to
      # /app below). Overrides the default ./data/databases.yaml, which is
      # gitignored. databases.dev.yaml targets the postgres service (emerald DB).
      DATABASES_FILE: /app/databases.dev.yaml
    # host.docker.internal resolves to the host on Docker Desktop natively; the
    # host-gateway mapping gives Linux the same name for the published-port
    # fallback path (see README).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tablekit
    ports:
      # app port: MCP (/mcp) + OAuth (/oauth/*, /register, /.well-known/*)
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
      # control port: /, /health, reserved for ops
      - target: 8081
        published: 8081
        protocol: tcp
        mode: host
    volumes:
      - type: bind
        source: ./core
        target: /app
      # Go module + build caches in a named volume so they survive container
      # recreation (deps download/compile once, then reused).
      - type: volume
        source: gocache
        target: /gocache
      # Host docker socket — the e2e suite drives the host daemon through this to
      # spin up/tear down throw-away DB containers (Docker-outside-of-Docker).
      # Read-write: tests create and destroy containers. See README for per-OS setup.
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 60s
    # Wait for postgres to finish seeding emerald before core boots, so the
    # first run_sql has a database to hit.
    depends_on:
      postgres:
        condition: service_healthy

  # Dev-only: a real Postgres pre-seeded with the emerald sample database, so
  # `docker compose up` gives run_sql actual data to query (and a real ChatGPT
  # MCP client something realistic to pair against). The seed reuses the e2e
  # fixture; the official image runs *.sql in initdb.d against POSTGRES_DB on
  # first init only — re-seed with `docker compose down -v`.
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pw
      POSTGRES_DB: emerald
    networks:
      - tablekit
    ports:
      # Published so a host psql/GUI can connect to localhost:5432 too.
      - "5432:5432"
    volumes:
      # Reuse the e2e emerald dump as an init script (no CREATE DATABASE inside,
      # so it lands in POSTGRES_DB=emerald).
      - type: bind
        source: ./core/e2e/database/test-data/emerald.sql
        target: /docker-entrypoint-initdb.d/emerald.sql
        read_only: true
      # Persist the seeded data across container recreation.
      - type: volume
        source: pgdata
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d emerald"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  # Dev-only: builds the @tablekit/widgets MCP Apps templates with bun + vite in
  # watch mode. Output lands in core/mcp/ui/widgets (bind-mounted below),
  # which the core container's Air watcher sees, triggering a Go rebuild that
  # re-embeds the new HTML — so editing a widget hot-reloads the whole stack.
  widgets:
    image: oven/bun:1
    working_dir: /widgets
    # `bun run dev` is `vite build --watch`. bun install runs first so a fresh
    # checkout works; it's a near-no-op once node_modules is populated.
    command: sh -c "bun install && bun run dev"
    networks:
      - tablekit
    volumes:
      # node_modules lives on the host (not a named volume) so the IDE resolves
      # types. The container writes Linux-native binaries here, which the IDE
      # never executes — only .d.ts types are read.
      - type: bind
        source: ./widgets
        target: /widgets
      # vite's dist/ maps to the core embed dir (core/mcp/ui/widgets), so built
      # widgets flow into core.
      - type: bind
        source: ./core/mcp/ui/widgets
        target: /widgets/dist

volumes:
  gocache:
  # Seeded emerald data for the dev postgres service.
  pgdata:

networks:
  # Stable, explicitly-named network (independent of the compose project dir) so
  # throw-away e2e DB containers can join it by a known name and be reached from
  # the core container by container hostname.
  tablekit:
    name: tablekit
