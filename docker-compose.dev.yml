services:
  core:
    build:
      context: ./core
      dockerfile: Dockerfile-dev
    environment:
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-http://localhost:8080}"

      # Ports the server listens on. app port: MCP (/mcp) + OAuth; control port:
      # /health. Overridable from the host env; the ports mapping below tracks
      # the same values so a change takes effect end-to-end.
      APP_PORT: "${APP_PORT:-8080}"
      CONTROL_PORT: "${CONTROL_PORT:-8081}"

      # Verbose logging in dev so the full per-tool/debug trace is visible. The
      # code default is info (see core/logging), which is what production uses.
      LOG_LEVEL: "${LOG_LEVEL:-debug}"

      # Development marker: turns on real (materialized) foreign-key constraints in
      # the schema migration, and dev-only OAuth client self-heal at /authorize
      # (recreates a wiped client so Reconnect works without re-adding the
      # connector). Unset/other values keep FK columns indexed but unconstrained
      # and reject unknown clients. See core/db/schema.go, core/db/ddl/foreign_keys.sql,
      # and core/http/app/oauth/authorize.go.
      TABLEKIT_ENV: development

      # Persist Go module + build caches in the gocache named volume (mounted
      # below) so deps are downloaded and compiled once, not on every start.
      GOMODCACHE: /gocache/mod
      GOCACHE: /gocache/build

      # The stable network throw-away e2e DB containers attach to, so code in
      # this container can reach them by name (e.g. testdb:5432).
      TABLEKIT_E2E_DOCKER_NETWORK: tablekit

      # Point run_sql at the committed dev DB config (core/ is bind-mounted to
      # /app below). Overrides the default ./databases.yaml, which is
      # gitignored. databases.dev.yaml targets the example-cafe-db service (cafe DB).
      DATABASES_FILE: /app/databases.dev.yaml

      # TableKit's own state lives in the dedicated `postgres` service (separate
      # from example-cafe-db). Structured DB_* vars take precedence over DATABASE_URL.
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: tablekit

      # SIGNING_KEY is required (no generated fallback). A fixed dev-only base64
      # HS256 key so the stack boots with zero host config; never use in prod.
      SIGNING_KEY: dGFibGVraXQtZGV2LXNpZ25pbmcta2V5LTMyYnl0ZXM=

    # host.docker.internal resolves to the host on Docker Desktop natively; the
    # host-gateway mapping gives Linux the same name for the published-port
    # fallback path (see README).
    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - tablekit

    ports:
      # app port: MCP (/mcp) + OAuth (/oauth/*, /register, /.well-known/*)
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"

      # control port: /, /health, reserved for ops
      - "${CONTROL_PORT:-8081}:${CONTROL_PORT:-8081}"

    volumes:
      - type: bind
        source: ./core
        target: /app

      # Go module + build caches in a named volume so they survive container
      # recreation (deps download/compile once, then reused).
      - type: volume
        source: gocache
        target: /gocache

      # Host docker socket — the e2e suite drives the host daemon through this to
      # spin up/tear down throw-away DB containers (Docker-outside-of-Docker).
      # Read-write: tests create and destroy containers. See README for per-OS setup.
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${CONTROL_PORT:-8081}/health"]
      # Poll infrequently in dev: a 10s interval spammed a /health request-log
      # line every 10 seconds. start_interval keeps startup fast (checks every 5s
      # until the first success), then it drops to one check every 10 minutes.
      interval: 10m
      timeout: 3s
      retries: 3
      start_period: 30s
      start_interval: 5s

    # Wait for the app-state postgres (so migrations have somewhere to run) and
    # for example-cafe-db to finish seeding (so the first run_sql has data to hit).
    depends_on:
      postgres:
        condition: service_healthy
      example-cafe-db:
        condition: service_healthy

  # Dev-only: TableKit's own state database (OAuth/MCP state + the query_database
  # descriptor log). Separate from example-cafe-db so the app's tables never mix with the
  # sample query data. core migrates this on boot; the DB_* env above points at
  # it. Persisted in the appdata volume across recreation (down -v to reset).
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tablekit

    networks:
      - tablekit

    ports:
      # Published on 5433 (example-cafe-db already owns host 5432) for a host psql/GUI.
      - published: 5433
        target: 5432
        protocol: tcp

    volumes:
      - type: volume
        source: pgdata
        target: /var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tablekit"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  # Dev-only: a real Postgres pre-seeded with the cafe sample database, so
  # `docker compose up` gives run_sql actual data to query (and a real ChatGPT
  # MCP client something realistic to pair against). The seed reuses the e2e
  # fixture; the official image runs *.sql in initdb.d against POSTGRES_DB on
  # first init only — re-seed with `docker compose down -v`.
  #
  # cafe_data.sql is a generator artifact (gitignored). Generate it before the
  # first `docker compose up`, else the bind mount below has no source file:
  #   (cd core/e2e/database/test-data && go run .)
  example-cafe-db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cafe

    networks:
      - tablekit

    ports:
      # Published so a host psql/GUI can connect to localhost:5432 too.
      - published: 5434
        target: 5432
        protocol: tcp

    volumes:
      # Reuse the e2e cafe seed as an init script (no CREATE DATABASE inside,
      # so it lands in POSTGRES_DB=cafe).
      - type: bind
        source: ./core/e2e/database/test-data/cafe_data.sql
        target: /docker-entrypoint-initdb.d/cafe_data.sql
        read_only: true

      # Persist the seeded data across container recreation.
      - type: volume
        source: example-cafe-db-data
        target: /var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cafe"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  # Dev-only: builds the @tablekit/widgets MCP Apps templates with bun + vite in
  # watch mode. Output lands in core/mcp/ui/widgets (bind-mounted below),
  # which the core container's Air watcher sees, triggering a Go rebuild that
  # re-embeds the new HTML — so editing a widget hot-reloads the whole stack.
  widgets:
    image: oven/bun:1
    working_dir: /widgets

    # `bun run dev` is `vite build --watch`. bun install runs first so a fresh
    # checkout works; it's a near-no-op once node_modules is populated.
    command: sh -c "bun install && bun run dev"

    networks:
      - tablekit

    volumes:
      # node_modules lives on the host (not a named volume) so the IDE resolves
      # types. The container writes Linux-native binaries here, which the IDE
      # never executes — only .d.ts types are read.
      - type: bind
        source: ./widgets
        target: /widgets

      # vite's dist/ maps to the core embed dir (core/mcp/ui/widgets), so built
      # widgets flow into core.
      - type: bind
        source: ./core/mcp/ui/widgets
        target: /widgets/dist

volumes:
  gocache:
  # TableKit's own state for the app-state postgres service.
  pgdata:
  # Seeded cafe data for the example-cafe-db service.
  example-cafe-db-data:

networks:
  # Stable, explicitly-named network (independent of the compose project dir) so
  # throw-away e2e DB containers can join it by a known name and be reached from
  # the core container by container hostname.
  tablekit:
    name: tablekit
